<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daybook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Mulish:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Nunito+Sans:ital,opsz,wght@0,6..12,400;0,6..12,500;0,6..12,600;0,6..12,700;1,6..12,400&family=Caprasimo&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#F8F3EB;
  --paper-2:#F3ECDF;
  --card:#FFFCF5;
  --card-2:#FBF5EA;
  --target-bg:#FBE4EA;
  --ink:#322C24;
  --ink-2:#6E6557;
  --ink-3:#A89D89;
  --line:rgba(50,44,36,.10);
  --line-2:rgba(50,44,36,.17);
  --line-3:rgba(50,44,36,.26);
  --accent:#E0881A;        /* marigold — primary / queue */
  --accent-soft:rgba(224,136,26,.13);
  --clay:#A9B0E8;          /* periwinkle — waiting */
  --sage:#7BC0A4;          /* mint — done */
  --danger:#D67C82;        /* soft rose — delete hovers */
  --butter:#F5BCC7;
  --serif:'Newsreader',Georgia,serif;
  --sans:'Mulish',system-ui,-apple-system,sans-serif;
  --display:'Caprasimo',Georgia,serif;
  --r:13px;
  --r-sm:10px;
  --sh-1:0 1px 2px rgba(50,44,36,.05);
  --sh-2:0 4px 14px rgba(50,44,36,.09);
  --sh-3:0 18px 50px rgba(50,44,36,.18);
}
html,body{height:100%}
body{
  font-family:var(--sans);background:var(--paper);color:var(--ink);
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  height:100vh;overflow:hidden;display:flex;flex-direction:column;
}
::selection{background:var(--accent-soft)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:var(--line-3);background-clip:padding-box}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
[contenteditable]{outline:none}
.ph:empty::before{content:attr(data-ph);color:var(--ink-3);font-weight:inherit;pointer-events:none}

/* ============ HEADER / TARGETS ============ */
.topbar{
  flex-shrink:0;display:flex;align-items:center;gap:30px;
  padding:18px 30px 16px;border-bottom:1px solid var(--line);
}
.brand{display:flex;flex-direction:column;gap:1px;flex-shrink:0;min-width:138px}
.mark{font-family:var(--display);font-size:25px;font-weight:500;letter-spacing:-.02em;line-height:1;color:var(--ink)}
.mark .dot{color:var(--accent)}
.date{font-size:11.5px;font-weight:600;letter-spacing:.04em;color:var(--ink-3);text-transform:uppercase;margin-top:5px}

.targets{flex:1;display:flex;align-items:stretch;gap:14px;min-width:0}
.t-eyebrow{
  writing-mode:vertical-rl;transform:rotate(180deg);
  font-family:var(--serif);font-style:italic;font-size:12.5px;color:var(--ink-3);
  letter-spacing:.02em;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  padding:2px 0;
}
.target{
  flex:1;min-width:0;display:flex;align-items:flex-start;gap:12px;
  background:var(--target-bg);border:1px solid var(--line);border-radius:var(--r);
  padding:11px 16px 12px;box-shadow:var(--sh-1);position:relative;transition:border-color .18s,box-shadow .18s;
}
.target:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.target-tag{
  font-family:var(--serif);font-style:italic;font-weight:500;font-size:15px;color:var(--accent);
  line-height:1.7;flex-shrink:0;width:18px
}
.target-text{
  flex:1;min-width:0;font-family:var(--serif);font-size:19px;font-weight:400;line-height:1.4;
  color:var(--ink);padding-top:1px;letter-spacing:-.005em;
}
.topbar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{
  width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:var(--ink-2);border:1px solid var(--line-2);background:var(--card);transition:all .16s;position:relative;
}
.icon-btn:hover{color:var(--ink);border-color:var(--line-3);box-shadow:var(--sh-1)}
.icon-btn svg{width:18px;height:18px}
.hist-dot{position:absolute;top:7px;right:8px;width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0;transform:scale(.4);transition:all .2s}
.hist-dot.on{opacity:1;transform:scale(1)}

/* ============ DESK ============ */
.desk{flex:1;display:flex;gap:18px;padding:16px 30px;min-height:0}

/* Brain dump rail */
.brain{
  width:248px;flex-shrink:0;display:flex;flex-direction:column;min-height:0;
  background:var(--card-2);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-1);
}
.brain-head{padding:15px 17px 11px;border-bottom:1px solid var(--line)}
.brain-title{font-family:var(--display);font-size:18px;font-weight:500;letter-spacing:-.01em;line-height:1}
.brain-sub{font-size:11.5px;color:var(--ink-3);font-weight:500;margin-top:3px;font-style:italic;font-family:var(--serif)}
.brain-input-wrap{padding:11px 13px 9px;display:flex;align-items:center;gap:8px}
.brain-plus{color:var(--ink-3);flex-shrink:0;display:flex}
.brain-plus svg{width:15px;height:15px}
.brain-input{
  flex:1;min-width:0;font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--ink);
  background:none;border:none;outline:none;padding:2px 0;caret-color:var(--accent);
}
.brain-input::placeholder{color:var(--ink-3);font-weight:500}
.brain-body{flex:1;overflow-y:auto;padding:4px 11px 13px;display:flex;flex-direction:column;gap:7px}
.brain-body.over{background:var(--accent-soft);border-radius:0 0 var(--r) var(--r)}
.slip{
  background:var(--card);border:1px solid var(--line);border-left:3px solid var(--line-3);
  border-radius:7px;padding:8px 10px 8px 11px;box-shadow:var(--sh-1);cursor:grab;
  display:flex;align-items:flex-start;gap:8px;transition:box-shadow .15s,border-color .15s,transform .1s;
}
.slip:hover{box-shadow:var(--sh-2);border-left-color:var(--accent)}
.slip.dragging{opacity:.45;cursor:grabbing}
.slip-text{flex:1;min-width:0;font-size:13.5px;font-weight:600;line-height:1.4;color:var(--ink);word-break:break-word}
.slip-x{
  opacity:0;flex-shrink:0;color:var(--ink-3);font-size:14px;line-height:1;padding:1px 3px;border-radius:5px;
  transition:opacity .14s,color .14s,background .14s;margin-top:1px;
}
.slip:hover .slip-x{opacity:1}
.slip-x:hover{color:var(--danger);background:var(--card-2)}
.brain-empty{font-family:var(--serif);font-style:italic;color:var(--ink-3);font-size:13.5px;text-align:center;padding:30px 12px;line-height:1.6}

/* Board */
.board{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;min-width:0;min-height:0}
.lane{
  display:flex;flex-direction:column;min-height:0;
  background:var(--card-2);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-1);
}
.lane-head{
  padding:14px 16px 11px;display:flex;align-items:baseline;justify-content:space-between;
  border-bottom:1px solid var(--line);flex-shrink:0;
}
.lane-name{font-family:var(--display);font-size:18px;font-weight:500;letter-spacing:-.01em;display:flex;align-items:center;gap:9px;line-height:1}
.lane-name::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--ink-3);flex-shrink:0}
.lane-queue   .lane-name::before{background:var(--accent)}
.lane-waiting .lane-name::before{background:var(--clay)}
.lane-done    .lane-name::before{background:var(--sage)}
.lane-meta{display:flex;align-items:center;gap:10px;flex-shrink:0}
.lane-count{font-size:12px;font-weight:700;color:var(--ink-3);font-variant-numeric:tabular-nums}
.lane-clear{font-size:11px;font-weight:700;color:var(--ink-3);letter-spacing:.02em;padding:2px 8px;border-radius:20px;transition:all .15s}
.lane-clear:hover{color:var(--clay);background:var(--card)}
.lane-body{flex:1;overflow-y:auto;padding:9px 11px 14px;display:flex;flex-direction:column;gap:8px}
.lane-body.over{background:var(--accent-soft)}
.lane-waiting .lane-body.over{background:color-mix(in srgb,var(--clay) 16%,transparent)}
.lane-done .lane-body.over{background:color-mix(in srgb,var(--sage) 18%,transparent)}
.lane-empty{font-family:var(--serif);font-style:italic;color:var(--ink-3);font-size:14px;text-align:center;padding:34px 14px;line-height:1.6}

/* Cards */
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:11px 12px 10px;box-shadow:var(--sh-1);cursor:grab;position:relative;
  transition:box-shadow .15s,border-color .15s,transform .08s;
}
.card:hover{box-shadow:var(--sh-2);border-color:var(--line-2)}
.card.dragging{opacity:.4;cursor:grabbing}
.card-main{display:flex;align-items:flex-start;gap:10px}
.card-check{
  width:18px;height:18px;border-radius:50%;border:1.6px solid var(--line-3);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--card);
}
.card-check:hover{border-color:var(--sage);background:color-mix(in srgb,var(--sage) 16%,transparent)}
.card-check svg{width:11px;height:11px;opacity:0;transform:scale(.5);transition:all .15s;color:#fff}
.card-title{
  flex:1;min-width:0;font-size:14px;font-weight:600;line-height:1.42;color:var(--ink);
  word-break:break-word;letter-spacing:-.005em;
}
.card-note{
  font-size:12.5px;font-weight:500;line-height:1.5;color:var(--ink-2);
  margin-top:7px;padding-top:7px;border-top:1px dashed var(--line-2);word-break:break-word;white-space:pre-wrap;
}
.card-note:empty{display:none}
.card-note.editing:empty{display:block;min-height:18px}
.card-tools{
  position:absolute;top:8px;right:9px;display:flex;gap:2px;opacity:0;transition:opacity .14s;
}
.card:hover .card-tools{opacity:1}
.tool{
  font-size:11px;font-weight:700;color:var(--ink-3);padding:3px 6px;border-radius:6px;line-height:1;
  transition:all .14s;letter-spacing:.01em;
}
.tool:hover{color:var(--ink);background:var(--card-2)}
.tool.del:hover{color:var(--danger)}
.tool svg{width:13px;height:13px;display:block}
/* done cards */
.card-done .card-title{color:var(--ink-3);text-decoration:line-through;text-decoration-color:var(--line-3);font-weight:500}
.card-done{background:var(--card-2);box-shadow:none}
.card-done .card-note{display:none}

/* ============ WORK NOTES ============ */
.worknotes{
  flex-shrink:0;border-top:1px solid var(--line);padding:12px 30px 14px;background:var(--paper);
  display:flex;flex-direction:column;gap:7px;
}
.wn-head{display:flex;align-items:baseline;gap:11px}
.wn-title{font-family:var(--display);font-size:17px;font-weight:500;letter-spacing:-.01em;white-space:nowrap;flex-shrink:0}
.wn-sub{flex-shrink:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wn-sub{font-size:11.5px;font-weight:500;color:var(--ink-3);font-style:italic;font-family:var(--serif)}
.wn-area{
  width:100%;height:84px;resize:none;font-family:var(--sans);font-size:13.5px;font-weight:500;line-height:24px;
  color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:10px 16px;outline:none;caret-color:var(--accent);box-shadow:var(--sh-1);transition:border-color .16s;
  white-space:pre-wrap;
}
.wn-area:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.wn-area::placeholder{color:var(--ink-3);font-weight:500;font-style:italic}
/* ruled notebook lines */
body.ruled .wn-area{
  background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 23px,var(--line) 23px,var(--line) 24px);
  background-position:0 11px;line-height:24px;
}
body.ruled .brain-body{
  background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 39px,var(--line) 39px,var(--line) 40px);
}

/* ============ HISTORY DRAWER ============ */
.scrim{position:fixed;inset:0;background:rgba(50,44,36,.28);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .26s;z-index:60}
.scrim.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;top:0;right:0;height:100%;width:384px;max-width:92vw;z-index:70;
  background:var(--paper);border-left:1px solid var(--line-2);box-shadow:var(--sh-3);
  transform:translateX(102%);transition:transform .3s cubic-bezier(.4,.0,.2,1);
  display:flex;flex-direction:column;
}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:20px 22px 15px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between}
.drawer-title{font-family:var(--display);font-size:23px;font-weight:500;letter-spacing:-.01em;line-height:1.1}
.drawer-sub{font-size:12px;color:var(--ink-3);font-weight:500;margin-top:3px}
.drawer-close{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink-2);transition:all .15s}
.drawer-close:hover{background:var(--card);color:var(--ink)}
.drawer-close svg{width:17px;height:17px}
.drawer-body{flex:1;overflow-y:auto;padding:8px 14px 24px}
.hist-empty{font-family:var(--serif);font-style:italic;color:var(--ink-3);text-align:center;padding:50px 20px;font-size:14.5px;line-height:1.6}
.h-day{font-size:10.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);padding:16px 8px 7px}
.h-entry{display:flex;gap:12px;padding:8px;border-radius:9px;transition:background .14s}
.h-entry:hover{background:var(--card-2)}
.h-rail{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding-top:3px}
.h-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--card);border:1px solid var(--line-2)}
.h-icon svg{width:13px;height:13px}
.h-created .h-icon{color:var(--accent)}
.h-edited  .h-icon{color:var(--ink-2)}
.h-moved   .h-icon{color:var(--clay)}
.h-completed .h-icon{color:var(--sage)}
.h-deleted .h-icon{color:#B5564B}
.h-restored .h-icon{color:var(--accent)}
.h-main{flex:1;min-width:0;padding-top:1px}
.h-line{font-size:13px;line-height:1.45;color:var(--ink)}
.h-line b{font-weight:700}
.h-quote{font-weight:600}
.h-foot{display:flex;align-items:center;gap:10px;margin-top:4px}
.h-time{font-size:11px;font-weight:600;color:var(--ink-3);font-variant-numeric:tabular-nums}
.h-restore{font-size:11.5px;font-weight:800;color:var(--accent);letter-spacing:.01em;padding:1px 2px;border-radius:5px;transition:all .14s}
.h-restore:hover{text-decoration:underline}
.h-restore[disabled]{color:var(--ink-3);font-weight:600;cursor:default;text-decoration:none}

/* ============ TOAST ============ */
.toast{
  position:fixed;bottom:154px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--ink);color:var(--paper);font-size:13px;font-weight:600;
  padding:10px 12px 10px 18px;border-radius:30px;z-index:80;display:flex;align-items:center;gap:14px;
  box-shadow:var(--sh-3);opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast-msg b{font-weight:700;color:#fff}
.toast-undo{font-weight:800;color:var(--butter);padding:3px 11px;border-radius:20px;background:rgba(255,255,255,.10);transition:background .15s}
.toast-undo:hover{background:rgba(255,255,255,.20)}

/* minimal type mode — single clean sans, crisp headings */
body.min .mark,body.min .lane-name,body.min .brain-title,body.min .wn-title,body.min .drawer-title{font-weight:800;letter-spacing:-.025em}
body.min .target-text{font-family:var(--sans);font-weight:600;font-size:18px;letter-spacing:-.012em}
body.min .target-tag{font-family:var(--sans);font-style:normal;font-weight:800;font-size:12px;line-height:2}
body.min .t-eyebrow{font-family:var(--sans);font-style:normal;text-transform:uppercase;font-size:9.5px;letter-spacing:.2em;font-weight:800}
body.min .brain-sub,body.min .wn-sub{font-style:normal;font-family:var(--sans)}

@media (max-width:1080px){
  .brain{width:212px}
  .desk{padding:16px 20px}
  .topbar{padding:16px 20px 14px}
  .worknotes{padding:12px 20px 14px}
}
</style>
</head>
<body class="ruled" style="font-family: Newsreader; font-size: 14px">

<!-- ===== HEADER + TARGETS ===== -->
<header class="topbar">
  <div class="brand">
    <div class="mark">Daybook<span class="dot">.</span></div>
    <div class="date" id="date">—</div>
  </div>
  <div class="targets">
    <div class="t-eyebrow">today</div>
    <div class="target">
      <span class="target-tag">01</span>
      <div class="target-text ph" id="target-0" contenteditable="true" spellcheck="false" data-ph="The first thing that matters today…"></div>
    </div>
    <div class="target">
      <span class="target-tag">02</span>
      <div class="target-text ph" id="target-1" contenteditable="true" spellcheck="false" data-ph="The second thing that matters…"></div>
    </div>
  </div>
  <div class="topbar-actions">
    <button class="icon-btn" id="hist-btn" title="History" aria-label="History">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"></path><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"></path><path d="M12 7v5l3 2"></path></svg>
      <span class="hist-dot" id="hist-dot"></span>
    </button>
  </div>
</header>

<!-- ===== DESK ===== -->
<main class="desk">

  <!-- Brain Dump -->
  <section class="brain">
    <div class="brain-head">
      <div class="brain-title">Brain Dump</div>
      <div class="brain-sub">capture now — drag onto the board later</div>
    </div>
    <div class="brain-input-wrap">
      <span class="brain-plus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"></path></svg></span>
      <input type="text" class="brain-input" id="brain-input" placeholder="Type a thought, press Enter" autocomplete="off" spellcheck="false">
    </div>
    <div class="brain-body" id="brain-body"></div>
  </section>

  <!-- Board -->
  <section class="board">
    <div class="lane lane-queue" id="lane-queue">
      <div class="lane-head">
        <div class="lane-name">Queue</div>
        <div class="lane-meta"><span class="lane-count" id="count-queue"></span></div>
      </div>
      <div class="lane-body" id="body-queue" data-lane="queue"></div>
    </div>
    <div class="lane lane-waiting" id="lane-waiting">
      <div class="lane-head">
        <div class="lane-name">Waiting</div>
        <div class="lane-meta"><span class="lane-count" id="count-waiting"></span></div>
      </div>
      <div class="lane-body" id="body-waiting" data-lane="waiting"></div>
    </div>
    <div class="lane lane-done" id="lane-done">
      <div class="lane-head">
        <div class="lane-name">Done</div>
        <div class="lane-meta">
          <span class="lane-count" id="count-done"></span>
          <button class="lane-clear" id="clear-done">Clear</button>
        </div>
      </div>
      <div class="lane-body" id="body-done" data-lane="done"></div>
    </div>
  </section>
</main>

<!-- ===== WORK NOTES ===== -->
<footer class="worknotes">
  <div class="wn-head">
    <span class="wn-title">Work Notes</span>
    <span class="wn-sub">your scratchpad — numbers, links, vendor notes, anything</span>
  </div>
  <textarea class="wn-area" id="worknotes" spellcheck="false" placeholder="Jot anything here…"></textarea>
</footer>

<!-- ===== HISTORY DRAWER ===== -->
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-label="History">
  <div class="drawer-head">
    <div>
      <div class="drawer-title">History</div>
      <div class="drawer-sub">Everything you did — restore anything</div>
    </div>
    <button class="drawer-close" id="drawer-close" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
    </button>

<!-- ===== TWEAKS ===== -->
<div id="tweaks-root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "Dahlia Orth",
  "headings": "Minimal",
  "ruled": false
}/*EDITMODE-END*/;

// each theme: [paper, paper-2, accent(=queue), clay(=waiting), sage(=done), target-bg]
const THEMES = {
  "Dahlia Orth":  ["#F8F3EB", "#F3ECDF", "#E0881A", "#A9B0E8", "#7BC0A4", "#FBE4EA"],
  "Daybook warm": ["#F2E8D6", "#EFE3CE", "#C68A3A", "#BB7B57", "#7D9462", "#FFFCF5"],
  "Sage garden":  ["#EFEAE0", "#E8E1D4", "#7D9462", "#9A86C4", "#C58A5B", "#ECEFE5"],
  "Dusk":         ["#F1ECE4", "#EAE3D6", "#6E7CC2", "#C98AAE", "#5FA98F", "#E8EAF6"]
};

function TweaksApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(() => {
    const r = document.documentElement.style;
    const [paper, paper2, accent, clay, sage, targetBg] = THEMES[t.theme] || THEMES["Dahlia Orth"];
    r.setProperty('--paper', paper);
    r.setProperty('--paper-2', paper2);
    r.setProperty('--accent', accent);
    r.setProperty('--accent-soft', hexA(accent, .14));
    r.setProperty('--clay', clay);
    r.setProperty('--sage', sage);
    r.setProperty('--target-bg', targetBg);
    const FONTS = {
      Minimal:   ["'Mulish',system-ui,sans-serif", "'Mulish',system-ui,sans-serif"],
      Editorial: ["'Newsreader',Georgia,serif", "'Newsreader',Georgia,serif"],
      Playful:   ["'Caprasimo',Georgia,serif", "'Newsreader',Georgia,serif"]
    };
    const [disp, ser] = FONTS[t.headings] || FONTS.Minimal;
    r.setProperty('--display', disp);
    r.setProperty('--serif', ser);
    document.body.classList.toggle('min', t.headings === 'Minimal');
    document.body.classList.toggle('ruled', !!t.ruled);
  }, [t]);
  return (
    <TweaksPanel>
      <TweakSection label="Theme" />
      <TweakColor label="Palette" value={THEMES[t.theme] ? THEMES[t.theme].slice(2,6) : null}
        options={Object.keys(THEMES).map(k => THEMES[k].slice(2,6))}
        onChange={(arr) => {
          const name = Object.keys(THEMES).find(k => THEMES[k].slice(2,6).join() === arr.join());
          if (name) setTweak('theme', name);
        }} />
      <TweakSelect label="Named theme" value={t.theme}
        options={Object.keys(THEMES)}
        onChange={(v) => setTweak('theme', v)} />
      <TweakSection label="Type & feel" />
      <TweakRadio label="Headings" value={t.headings}
        options={['Minimal', 'Editorial', 'Playful']}
        onChange={(v) => setTweak('headings', v)} />
      <TweakToggle label="Ruled paper" value={t.ruled}
        onChange={(v) => setTweak('ruled', v)} />
    </TweaksPanel>
  );
}
function hexA(hex, a){
  const h = hex.replace('#',''); const n = parseInt(h.length===3 ? h.split('').map(c=>c+c).join('') : h, 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<TweaksApp />);
</script>
</body>
